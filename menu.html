<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 ALKE WALLET 💰 - Mi Cuenta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .navbar-fintech { background-color: #3538c7; }
        .balance-card { background: linear-gradient(135deg, #06324a, #00b4d8); color: white; border-radius: 15px; padding: 30px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-fintech">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">💰 ALKE WALLET 💰</a>
            <button class="navbar-expand-lg navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="menu.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="sendmoney.html">Transferir / Contactos</a></li>
                    <li class="nav-item"><a class="nav-link text-warning" href="index.html">Cerrar Sesión</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <div class="col-md-5 mb-4">
                <div class="balance-card shadow-sm text-center card-animate">
                    <h4 class="text-white-50">Saldo Disponible</h4>
                    <h1 class="display-4 fw-bold">$<span id="current-balance">150000</span></h1>
                    <button class="btn btn-light mt-3 fw-bold text-primary" data-bs-toggle="modal" data-bs-target="#depositModal">+ Depositar / Retirar</button>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card shadow-sm p-4 bg-white rounded">
                    <h2 class="mb-3" style="color: #3b3dc6;">Últimos Movimientos</h2>
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                                <tr>
                                    <th>Detalle</th>
                                    <th>Fecha</th>
                                    <th>Monto</th>
                                </tr>
                            </thead>
                            <tbody id="transaction-history">
                                <tr>
                                    <td>Depósito Inicial</td>
                                    <td>18/07/2026</td>
                                    <td class="text-success fw-bold">+$150,000</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="depositModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Administrar Fondos</h5>
                    <button type="button" class="btn-close" data-bs-shadow="none" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Acción</label>
                        <select class="form-select" id="transaction-type">
                            <option value="deposit">Depositar</option>
                            <option value="withdraw">Retirar</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Monto ($)</label>
                        <input type="number" class="form-control" id="amount-input" min="1" placeholder="Ej: 5000">
                    </div>
                    <div id="modal-error" class="text-danger mb-2" style="display: none;">Monto inválido o fondos insuficientes.</div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btn-process-funds">Procesar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        $(document).ready(function() {
    if (!localStorage.getItem('balance')) {
        localStorage.setItem('balance', '150000');
    }
    
    function cargarHistorial() {

        $('#transaction-history').empty();
        
        let txHistory = JSON.parse(localStorage.getItem('globalTransactions') || "[]");

        txHistory.reverse().forEach(function(tx) {
            let textClass = (tx.tipo === 'deposit') ? 'text-success' : 'text-danger';
            let sign = (tx.tipo === 'deposit') ? '+$' : '-$';
            
            $('#transaction-history').append(`
                <tr>
                    <td>${tx.detalle}</td>
                    <td>${tx.fecha}</td>
                    <td class="${textClass} fw-bold">${sign}${tx.monto.toLocaleString('es-CL')}</td>
                </tr>
            `);
        });

        $('#transaction-history').append(`
            <tr>
                <td>Depósito Inicial</td>
                <td>18/07/2026</td>
                <td class="text-success fw-bold">+$150.000</td>
            </tr>
        `);
    }

    $('#current-balance').text(Number(localStorage.getItem('balance')).toLocaleString('es-CL'));
    cargarHistorial();

    $('#btn-process-funds').click(function() {
        let type = $('#transaction-type').val();
        let amount = parseInt($('#amount-input').val());
        let currentBalance = parseInt(localStorage.getItem('balance'));

        if(isNaN(amount) || amount <= 0 || (type === 'withdraw' && amount > currentBalance)) {
            $('#modal-error').fadeIn();
            return;
        }
        $('#modal-error').hide();

        let newBalance = (type === 'deposit') ? currentBalance + amount : currentBalance - amount;
        localStorage.setItem('balance', newBalance);
        $('#current-balance').text(newBalance.toLocaleString('es-CL'));

        let txHistory = JSON.parse(localStorage.getItem('globalTransactions') || "[]");
        let textType = (type === 'deposit') ? 'Depósito Web' : 'Retiro Cajero';
        
        let newTx = {
            detalle: textType,
            fecha: new Date().toLocaleDateString('es-CL'),
            monto: amount,
            tipo: type
        };
        txHistory.push(newTx);
        localStorage.setItem('globalTransactions', JSON.stringify(txHistory));
        // -------------------------------------------------------------------------

        cargarHistorial();

        $('#amount-input').val('');
        $('#depositModal').modal('hide');
    });
});
    </script>
</body>
</html>
