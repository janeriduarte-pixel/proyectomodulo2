<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Verdana, sans-serif; }
        .login-card { max-width: 400px; margin: auto; padding: 30px; border-radius: 10px; background: white; box-shadow: 0px 4px 15px rgba(0,0,0,0.1); }
        .btn-fintech { background-color: #eef1f1; color: white; }
        .btn-fintech:hover { background-color: #0077b6; color: white; }
    </style>
</head> 
<body>
    <div class="container">
        <div class="login-card text-center">
            <h1 class="mb-4" style="color: #4547a8;">💰 ALKE WALLET 💰</h1>
            <p class="text-muted">Ingresa a tu billetera digital💸</p>
            <form id="loginForm">
                <div class="mb-3 text-start">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <input type="email" class="form-control" id="email" required placeholder="ejemplo@correo.com">
                </div>
                <div class="mb-3 text-start">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" required placeholder="******">
                </div>
                <div id="error-message" class="text-danger mb-3" style="display: none;">Información incorrecta. Intenta de nuevo.</div>
                <button type="submit" class="btn btn-fintech w-100 fw-bold">¡Iniciar Sesión!</button>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>

        $(document).ready(function() {
            $('#loginForm').on('submit', function(e) {
                e.preventDefault(); 
                let email = $('#email').val();
                let password = $('#password').val();
                if(email === "profe@alke.com" && password === "1234") {
                    window.location.href = "menu.html"; 
                } else {
                    $('#error-message').fadeIn(); 
                }
            });
        });
    </script>
</body>
</html>
